spring.application.name=hospitalbackend

# Enable local profile by default (picks up application-local.properties)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://hospital-db-medicore-hms.f.aivencloud.com:13409/defaultdb?ssl-mode=REQUIRED}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:avnadmin}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}